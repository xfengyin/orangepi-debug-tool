name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.85
  NODE_VERSION: 18
  APP_NAME: orangepi-debug-tool
  APP_VERSION: ${{ github.ref_name }}

jobs:
  # Windows Build
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          npm ci
          cd src-tauri
          cargo fetch
      
      - name: Build Windows
        run: |
          npm run tauri build -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/**/*.msi
          if-no-files-found: ignore
      
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/**/*.exe
          if-no-files-found: ignore

  # Linux Build
  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libgcrypt20-dev \
            build-essential \
            pkg-config
      
      - name: Install dependencies
        run: |
          npm ci
          cd src-tauri
          cargo fetch
      
      - name: Build Linux
        run: |
          npm run tauri build -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/**/*.deb
          if-no-files-found: ignore
      
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/**/*.AppImage
          if-no-files-found: ignore

  # macOS Build
  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          npm ci
          cd src-tauri
          cargo fetch
      
      - name: Build macOS
        run: |
          npm run tauri build -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/**/*.dmg
          if-no-files-found: ignore
      
      - name: Upload macOS APP
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: src-tauri/target/release/bundle/macos/**/*.app
          if-no-files-found: ignore

  # Create Release
  create-release:
    runs-on: ubuntu-22.04
    needs: [build-windows, build-linux, build-macos]
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: release/windows-msi
        continue-on-error: true
      
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release/windows-exe
        continue-on-error: true
      
      - name: Download Linux DEB
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release/linux-deb
        continue-on-error: true
      
      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release/linux-appimage
        continue-on-error: true
      
      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release/macos-dmg
        continue-on-error: true
      
      - name: Download macOS APP
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: release/macos-app
        continue-on-error: true
      
      - name: Generate Release Notes
        id: release_notes
        run: |
          cat > release/RELEASE_NOTES.md << 'EOF'
          # OrangePi Debug Tool ${{ env.APP_VERSION }}
          
          ## 🎉 新功能
          
          - 完整串口调试功能
          - GPIO 控制
          - PWM 输出
          - 数据日志与导出
          - 协议解析 (MODBUS)
          - 多串口管理
          - 宏命令/脚本
          - 主题切换
          - 国际化
          
          ## 📦 安装包
          
          构建完成后自动上传
          
          ## 🔗 链接
          
          - GitHub: https://github.com/xfengyin/orangepi-debug-tool
          - 用户手册: USER-MANUAL.md
          - 开发者指南: DEVELOPER-GUIDE.md
          EOF
          cat release/RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/windows-msi/*.msi
            release/windows-exe/*.exe
            release/linux-deb/*.deb
            release/linux-appimage/*.AppImage
            release/macos-dmg/*.dmg
            release/macos-app/*.app
          body_path: release/RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
