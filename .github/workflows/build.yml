name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            suffix: .exe
          - os: ubuntu-latest
            platform: linux
            suffix: ''
          - os: macos-latest
            platform: macos
            suffix: ''

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter pyserial pyyaml rich

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed ^
            --name "OrangePiDebugTool" ^
            --add-data "src/orangepi_debug_tool;orangepi_debug_tool" ^
            --hidden-import=customtkinter ^
            --hidden-import=serial ^
            --hidden-import=serial.tools.list_ports ^
            --hidden-import=yaml ^
            --hidden-import=rich ^
            --collect-all customtkinter ^
            --paths src ^
            run.py
        shell: cmd
        if: matrix.platform == 'windows'

      - name: Build with PyInstaller (Unix)
        run: |
          pyinstaller --onefile --windowed             --name "OrangePiDebugTool"             --add-data "src/orangepi_debug_tool:orangepi_debug_tool"             --hidden-import=customtkinter             --hidden-import=serial             --hidden-import=serial.tools.list_ports             --hidden-import=yaml             --hidden-import=rich             --collect-all customtkinter             --paths src             run.py
        if: matrix.platform != 'windows'

      - name: Rename executable
        run: |
          mv dist/OrangePiDebugTool${{ matrix.suffix }} dist/OrangePiDebugTool-${{ matrix.platform }}${{ matrix.suffix }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangePiDebugTool-${{ matrix.platform }}
          path: dist/OrangePiDebugTool*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
