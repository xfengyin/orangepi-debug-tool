name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'v0.0.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            suffix: .exe
          - os: ubuntu-latest
            platform: linux
            suffix: ''
          - os: macos-latest
            platform: macos
            suffix: ''

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt || true
          pip install customtkinter pyserial pyyaml rich || true

      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --onefile --windowed --name "OrangePiDebugTool" `
            --add-data "src/orangepi_debug_tool;orangepi_debug_tool" `
            --hidden-import=customtkinter `
            --hidden-import=serial `
            --collect-all customtkinter `
            orange_debug_tool.py || pyinstaller --onefile --windowed --name "OrangePiDebugTool" orange_debug_tool.py
        shell: pwsh

      - name: Build executable (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          pyinstaller --onefile --windowed --name "OrangePiDebugTool"             --add-data "src/orangepi_debug_tool:orangepi_debug_tool"             --hidden-import=customtkinter             --hidden-import=serial             --collect-all customtkinter             orange_debug_tool.py || pyinstaller --onefile --windowed --name "OrangePiDebugTool" orange_debug_tool.py

      - name: Rename executable
        run: |
          mv dist/OrangePiDebugTool${{ matrix.suffix }} dist/OrangePiDebugTool-${{ matrix.platform }}${{ matrix.suffix }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangePiDebugTool-${{ matrix.platform }}
          path: dist/OrangePiDebugTool*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: ls -la artifacts/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## OrangePi Debug Tool Release
            
            ### 下载说明
            - **Windows**: 下载 `OrangePiDebugTool-windows.exe`
            - **Linux**: 下载 `OrangePiDebugTool-linux`
            - **macOS**: 下载 `OrangePiDebugTool-macos`
            
            ### 使用方法
            1. 下载对应平台的可执行文件
            2. Windows: 双击运行 .exe 文件
            3. Linux/macOS: 添加执行权限后运行
               ```bash
               chmod +x OrangePiDebugTool-linux
               ./OrangePiDebugTool-linux
               ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
