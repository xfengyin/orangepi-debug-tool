<!-- OrangePi Debug Tool Logo -->
<!-- SVG Application Icon -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded Square Background -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Circuit Board Pattern -->
  <g stroke="#ffffff" stroke-width="3" fill="none" opacity="0.3">
    <path d="M120 120 L200 120 L200 180"/>
    <path d="M392 120 L312 120 L312 180"/>
    <path d="M120 392 L200 392 L200 332"/>
    <path d="M392 392 L312 392 L312 332"/>
    
    <circle cx="200" cy="120" r="4" fill="#ffffff"/>
    <circle cx="312" cy="120" r="4" fill="#ffffff"/>
    <circle cx="200" cy="392" r="4" fill="#ffffff"/>
    <circle cx="312" cy="392" r="4" fill="#ffffff"/>
  </g>
  
  <!-- Serial Port Icon (DB9 Connector) -->
  <g transform="translate(256, 256)">
    <!-- Connector Body -->
    <rect x="-80" y="-60" width="160" height="100" rx="12" fill="#ffffff" opacity="0.95"/>
    
    <!-- Pin Holes (3 rows x 3 columns) -->
    <g fill="#6366f1">
      <!-- Top Row -->
      <circle cx="-50" cy="-30" r="6"/>
      <circle cx="0" cy="-30" r="6"/>
      <circle cx="50" cy="-30" r="6"/>
      
      <!-- Middle Row -->
      <circle cx="-50" cy="0" r="6"/>
      <circle cx="0" cy="0" r="6"/>
      <circle cx="50" cy="0" r="6"/>
      
      <!-- Bottom Row -->
      <circle cx="-50" cy="30" r="6"/>
      <circle cx="0" cy="30" r="6"/>
      <circle cx="50" cy="30" r="6"/>
    </g>
    
    <!-- Connector Pins (sides) -->
    <rect x="-90" y="-40" width="10" height="60" rx="3" fill="#e2e8f0"/>
    <rect x="80" y="-40" width="10" height="60" rx="3" fill="#e2e8f0"/>
  </g>
  
  <!-- Signal Waves -->
  <g stroke="#ffffff" stroke-width="4" fill="none" opacity="0.6">
    <path d="M140 200 Q160 180, 180 200 T220 200" stroke-linecap="round"/>
    <path d="M292 200 Q312 180, 332 200 T372 200" stroke-linecap="round"/>
  </g>
  
  <!-- Text Badge -->
  <g transform="translate(256, 420)">
    <text x="0" y="0" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" opacity="0.9">v2.0</text>
  </g>
</svg>
